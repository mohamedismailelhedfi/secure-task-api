name: DevSecOps Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: npm install

    - name: Run app test
      run: node index.js & sleep 5
    
    - name: Build Docker image
      run: docker build -t secure-api .